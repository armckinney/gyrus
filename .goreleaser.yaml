version: 2
project_name: gyrus

before:
  hooks:
    - go mod tidy
    - bash -c 'TAG="${GORELEASER_CURRENT_TAG:-latest}"; tar -czf gyrus-skill.tar.gz -C skills gyrus && cp gyrus-skill.tar.gz "gyrus-skill_${TAG}.tar.gz"'

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/gyrus
    binary: gyrus
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  extra_files:
    - glob: ./gyrus-skill*.tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
